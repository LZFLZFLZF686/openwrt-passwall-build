name: Build OpenWRT LEDE x86_64 + PassWall

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LEDE
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede
          cd lede
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git" >> feeds.conf.default

      - name: Update feeds
        working-directory: ./lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        working-directory: ./lede
        run: |
          cp /dev/null .config
          for opt in \
            CONFIG_TARGET_x86=y CONFIG_TARGET_x86_64=y \
            CONFIG_TARGET_x86_64_DEVICE_generic=y \
            CONFIG_TARGET_ROOTFS_PARTSIZE=1024 \
            CONFIG_GRUB_IMAGES=y CONFIG_EFI_IMAGES=y \
            CONFIG_PACKAGE_luci=y CONFIG_LUCI_LANG_zh_Hans=y \
            CONFIG_PACKAGE_luci-app-passwall=y \
            CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy=y \
            CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y \
            CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y \
            CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y \
            CONFIG_PACKAGE_curl=y CONFIG_PACKAGE_wget-ssl=y \
            CONFIG_PACKAGE_vim-fuller=y CONFIG_PACKAGE_htop=y \
            CONFIG_PACKAGE_tcpdump=y CONFIG_PACKAGE_iperf3=y \
            CONFIG_PACKAGE_openssh-sftp-server=y \
            CONFIG_PACKAGE_lsblk=y CONFIG_PACKAGE_blkid=y \
            CONFIG_PACKAGE_fdisk=y; do echo "$opt" >> .config; done
          make defconfig

      - name: Download sources
        working-directory: ./lede
        run: make download -j2

      - name: Compile
        working-directory: ./lede
        run: make -j2 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-passwall
          path: lede/bin/targets/x86/64/
          retention-days: 7
